services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.stage
    container_name: entropiq-stage-app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - entropiq-stage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  pgsql:
    image: postgres:16-alpine
    container_name: entropiq-stage-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-entropiq}
      POSTGRES_USER: ${DB_USERNAME:-entropiq}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - entropiq-stage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-entropiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: entropiq-stage-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - entropiq-stage
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-storage:
  pgsql-data:
  redis-data:

networks:
  entropiq-stage:
    driver: bridge
